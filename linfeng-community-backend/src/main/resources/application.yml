# Tomcat
server:
  tomcat:
    uri-encoding: UTF-8
    max-threads: 1000
    min-spare-threads: 30
  port: ${SERVER_PORT:8080}
  servlet:
    context-path:

spring:
  # 环境 dev|test|prod
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  output:
    ansi:
      enabled: ALWAYS
  # 允许循环依赖
  main:
    allow-circular-references: true
  # jackson时间格式化
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      enabled: true
  data:
    redis:
      database: ${REDIS_DATABASE:0}
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}    # 密码（默认为空）
      timeout: ${REDIS_TIMEOUT:6000ms}  # 连接超时时长（毫秒）
      lettuce:
        pool:
          max-active: 1000  # 连接池最大连接数（使用负值表示没有限制）
          max-wait: -1ms      # 连接池最大阻塞等待时间（使用负值表示没有限制）
          max-idle: 10      # 连接池中的最大空闲连接
          min-idle: 5       # 连接池中的最小空闲连接
  redis:
    open: ${REDIS_OPEN:true}  # 是否开启redis缓存  true开启   false关闭
  mvc:
    throw-exception-if-no-handler-found: true
  mail:
    host: ${MAIL_HOST:smtp.QQ.com}    #固定
    username: ${MAIL_USERNAME:111111@qq.com}
    password: ${MAIL_PASSWORD:fdgbaskassssdjcb}
    properties:
      mail:
        smtp:
          ssl:
            enable: true
  application:
    name: ${SPRING_APPLICATION_NAME:linfeng-community-sy}


#  resources:
#    add-mappings: false


#mybatis
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  #实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: io.linfeng.modules.*.entity
  global-config:
    #数据库相关配置
    db-config:
      #主键类型  AUTO:"数据库ID自增", INPUT:"用户输入ID", ID_WORKER:"全局唯一ID (数字类型唯一ID)", UUID:"全局唯一ID UUID";
      id-type: AUTO
      logic-delete-value: -1
      logic-not-delete-value: 0
    banner: false
  #原生配置
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'

task:
  pool:
    # 核心线程池大小
    core-pool-size: 10
    # 最大线程数
    max-pool-size: 30
    # 活跃时间
    keep-alive-seconds: 60
    # 队列容量
    queue-capacity: 50

linfeng:
  # APP模块jwt认证
  jwt:
    # 加密秘钥
    secret: f4e2e52034348f86b67cde581c0f9eb5
    # token有效时长，7天，单位秒
    expire: 604800
    header: token
  email:
    send: ${MAIL_SEND_FROM:111111@qq.com}  #发送方的邮箱地址
  #是否允许第三方应用通过请求特定接口实现登录
  thirdlogin:
    open: ${THIRDLOGIN_OPEN:false}   #true 开启   false 关闭  默认关闭
    secret: ${THIRDLOGIN_SECRET:iwucdszxghjkena0f}   #第三方登录密钥



#文件大小限制
cloudstorage:
  # 文件大小用户端和后台管理端 单位M
  max-size: 30
  admin-max-size: 30

# minio存储配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9005}  # MinIO服务地址
  accessKey: ${MINIO_ACCESS_KEY:linfeng01}                       # 访问密钥 (用户名)
  secretKey: ${MINIO_SECRET_KEY:minio123}        # 密钥 (密码)
  bucketName: ${MINIO_BUCKET_NAME:linfeng}                    # 默认存储桶名称

# Knife4j配置
knife4j:
  enable: ${KNIFE4J_ENABLE:false}
  basic:
    enable: ${KNIFE4J_BASIC_ENABLE:false}
    username: ${KNIFE4J_USERNAME:linfengcommunity}
    password: ${KNIFE4J_PASSWORD:linfengcommunity}
  setting:
    enableFooter: false
