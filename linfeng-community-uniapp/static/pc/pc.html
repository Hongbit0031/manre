<!DOCTYPE html>
<html lang=zh-CN>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width,user-scalable=no,initial-scale=1,maximum-scale=1,minimum-scale=1">
        <title>慢热</title>
        <meta name="Copyright" content="manre">
        <meta name="keywords" content="manre,community">
        <style type="text/css">
            body{
                margin: 0;
                background-color:  #f5f5f5;
            }
            iframe{
                width: 375px;
                height: 667px;
                background-color: #fff;
				box-sizing: border-box;
                border: none;
            }
			
            @media screen and (min-width: 450px) {
                iframe {
                    position: fixed;
                    top: 0;
                    right: 0;
                    bottom: 0;
                    left: 0;
                    margin: auto;
					border: 1px solid #f5f5f5;
                    border-radius: 4px;
                }
            }
        </style>
        <script type="text/javascript">
			//监听窗口尺寸
            window.isPC = true;
            window.onload = function(){
				if(window.innerWidth <= 420){
					window.location.pathname = '/';
				} else {
                    // 获取原始URL中的路径和参数
                    var originalPath = '/';
                    var hash = '';
                    var search = '';
                    
                    // 如果有保存的原始URL，则使用它
                    if(sessionStorage.getItem('originalUrl')) {
                        var savedUrl = sessionStorage.getItem('originalUrl');
                        
                        // 提取hash部分 (#/pages/...)
                        var hashIndex = savedUrl.indexOf('#');
                        if(hashIndex !== -1) {
                            hash = savedUrl.substring(hashIndex);
                        }
                        
                        // 提取search部分 (?id=...)
                        var searchIndex = savedUrl.indexOf('?');
                        if(searchIndex !== -1 && hashIndex === -1) {
                            search = savedUrl.substring(searchIndex);
                        }
                        
                        // 设置iframe的src
                        document.getElementById('iframe').src = originalPath + hash + search;
                    }
                }
            }
        </script>
    </head>
    <body>
		<iframe src="/" id="iframe"></iframe>
    </body>
</html>
